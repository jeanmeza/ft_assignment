<html>
<head>

  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="shortcut icon" type="image/x-icon" href="/resources/images/favicon.png">
  <title>PetClinic :: a Spring Framework demonstration</title>


</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark" role="navigation">
  <div class="container-fluid">
    <a class="navbar-brand" href="/"><span></span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#main-navbar">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="main-navbar">


      <ul class="nav navbar-nav me-auto">

        <li class="nav-item">
          <a class="nav-link" href="/" title="home page">
            <span class="fa fa-home"></span>
            <span>Home</span>
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link active" href="/owners/find" title="find owners">
            <span class="fa fa-search"></span>
            <span>Find Owners</span>
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/vets.html" title="veterinarians">
            <span class="fa fa-th-list"></span>
            <span>Veterinarians</span>
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/oups" title="trigger a RuntimeException to see how it is handled">
            <span class="fa fa-exclamation-triangle"></span>
            <span>Error</span>
          </a>
        </li>

      </ul>
    </div>
  </div>
</nav>
<div class="container-fluid">
  <div class="container xd-container">


    <h2>
      New
      <span>Pet</span>
    </h2>
    <form class="form-horizontal" method="post">
      <input type="hidden" name="id" value="">
      <div class="form-group has-feedback">
        <div class="form-group">
          <label class="col-sm-2 control-label">Owner</label>
          <div class="col-sm-10">
            <span>Jeff Black</span>
          </div>
        </div>

        <div class="form-group has-error">
          <label for="name" class="col-sm-2 control-label">Name</label>
          <div class="col-sm-10">
            <div>
              <input class="form-control" type="text" id="name" name="name" value="">

            </div>


            <span class="fa fa-remove form-control-feedback" aria-hidden="true"></span>
            <span class="help-inline">is required</span>

          </div>
        </div>


        <div class="form-group has-error">
          <label for="birthDate" class="col-sm-2 control-label">Birth Date</label>
          <div class="col-sm-10">
            <div>

              <input class="form-control" type="date" id="birthDate" name="birthDate" value="">
            </div>


            <span class="fa fa-remove form-control-feedback" aria-hidden="true"></span>
            <span class="help-inline">is required</span>

          </div>
        </div>


        <div class="form-group">
          <label for="type" class="col-sm-2 control-label">Type</label>

          <div class="col-sm-10">
            <select id="type" name="type">
              <option value="bird" selected="selected">bird</option>
              <option value="cat">cat</option>
              <option value="dog">dog</option>
              <option value="hamster">hamster</option>
              <option value="lizard">lizard</option>
              <option value="snake">snake</option>
            </select>
            <span class="fa fa-ok form-control-feedback" aria-hidden="true"></span>

          </div>
        </div>

      </div>
      <div class="form-group">
        <div class="col-sm-offset-2 col-sm-10">
          <button class="btn btn-primary" type="submit">Add Pet</button>
        </div>
      </div>
    </form>


    <br>
    <br>
    <div class="container">
      <div class="row">
        <div class="col-12 text-center">
          <img src="/resources/images/spring-logo.svg" alt="VMware Tanzu Logo" class="logo">
        </div>
      </div>
    </div>
  </div>
</div>


</body>
</html>
